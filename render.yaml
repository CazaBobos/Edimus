databases:
  - name: edimus-db
    databaseName: edimusdb
    user: edimusadmin
    plan: free
    region: oregon

services:
  - type: web
    name: edimus
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: edimus-db
          property: connectionString
      - key: Jwt__Secret
        sync: false
      - key: Jwt__ExpirationMinutes
        value: "480"
      - key: Email__From
        sync: false
      - key: Email__SmtpHost
        sync: false
      - key: Email__SmtpPort
        value: "587"
      - key: Email__SmtpUser
        sync: false
      - key: Email__SmtpPassword
        sync: false
